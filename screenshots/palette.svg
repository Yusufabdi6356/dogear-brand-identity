  </g>
  <g>
    <rect x="550" y="0" width="110" height="130" fill="#5A6472"/>
    <text x="562" y="102" font-size="13" fill="#FFFFFF">Slate</text>
    <text x="562" y="118" font-size="10" fill="#E3E9E5">#5A6472</text>
  </g>
  <g>
    <rect x="660" y="0" width="110" height="130" fill="#F4F7F5"/>
    <text x="672" y="102" font-size="13" fill="#14181F">Mist</text>
    <text x="672" y="118" font-size="10" fill="#5A6472">#F4F7F5</text>
  </g>
  <g>
    <rect x="770" y="0" width="110" height="130" fill="#FFFFFF" stroke="#E3E9E5" stroke-width="2"/>
    <text x="782" y="102" font-size="13" fill="#14181F">Cloud</text>
