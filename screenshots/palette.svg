<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 130" width="880" height="130" role="img" aria-label="dogear color palette">
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; }</style>
  <g>
    <rect x="0" y="0" width="110" height="130" fill="#16A75C"/>
    <text x="12" y="102" font-size="13" fill="#FFFFFF">Leaf</text>
    <text x="12" y="118" font-size="10" fill="#DCF5E7">#16A75C</text>
  </g>
  <g>
    <rect x="110" y="0" width="110" height="130" fill="#0E7C43"/>
    <text x="122" y="102" font-size="13" fill="#FFFFFF">Forest</text>
    <text x="122" y="118" font-size="10" fill="#DCF5E7">#0E7C43</text>
  </g>
  <g>
    <rect x="220" y="0" width="110" height="130" fill="#DCF5E7"/>
    <text x="232" y="102" font-size="13" fill="#0E7C43">Sprout</text>
    <text x="232" y="118" font-size="10" fill="#5A6472">#DCF5E7</text>
  </g>
  <g>
    <rect x="330" y="0" width="110" height="130" fill="#FFC53D"/>
    <text x="342" y="102" font-size="13" fill="#14181F">Sunny</text>
    <text x="342" y="118" font-size="10" fill="#7A5C10">#FFC53D</text>
  </g>
  <g>
    <rect x="440" y="0" width="110" height="130" fill="#14181F"/>
    <text x="452" y="102" font-size="13" fill="#FFFFFF">Ink</text>
