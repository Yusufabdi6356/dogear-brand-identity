<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Folio, the dogear mascot — a green dog with one folded ear">
  <!-- Left ear (upright) — drawn first, head overlaps its base -->
  <path fill="#0E7C43" d="M58 96 C40 46 62 24 82 42 C94 53 96 72 92 92 Z"/>
  <!-- Head -->
  <circle cx="100" cy="120" r="62" fill="#16A75C"/>
  <!-- Right ear (flopped — the dog-ear) -->
  <path fill="#0E7C43" d="M142 62 C168 38 188 60 178 94 C171 116 152 124 141 112 C133 103 134 80 142 62 Z"/>
  <!-- Sunny lining of the folded ear -->
  <path fill="#FFC53D" d="M150 70 C165 57 176 70 170 92 C166 106 154 112 148 104 C143 97 144 82 150 70 Z"/>
  <!-- Cheeks -->
  <circle cx="60" cy="136" r="7" fill="#8FE0B4" opacity="0.9"/>
  <circle cx="140" cy="136" r="7" fill="#8FE0B4" opacity="0.9"/>
  <!-- Muzzle -->
  <ellipse cx="100" cy="148" rx="32" ry="24" fill="#FFFFFF"/>
  <!-- Eyes -->
  <circle cx="76" cy="112" r="9" fill="#14181F"/>
  <circle cx="124" cy="112" r="9" fill="#14181F"/>
  <circle cx="79" cy="109" r="3.2" fill="#FFFFFF"/>
  <circle cx="127" cy="109" r="3.2" fill="#FFFFFF"/>
  <!-- Nose -->
  <path fill="#14181F" d="M91 138 Q100 132 109 138 Q109 147 100 151 Q91 147 91 138 Z"/>
  <!-- Smile -->
  <path fill="none" stroke="#14181F" stroke-width="4" stroke-linecap="round" d="M84 158 Q100 170 116 158"/>
</svg>
