<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create an account — dogear</title>
<link rel="icon" href="../logo/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script>try{var m=location.search.match(/theme=(dark|light)/);var t=(m&&m[1])||localStorage.getItem("dogear-theme");if(!t)t=window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}</script>
<link rel="stylesheet" href="styles.css">
<style>
  .auth-page { min-height: calc(100vh - 116px); display: grid; place-items: center; padding: clamp(40px, 7vw, 84px) 0; }
  .auth-card { width: min(100%, 500px); padding: clamp(26px, 5vw, 42px); text-align: center; }
  .auth-card > img { width: 96px; margin: -8px auto 8px; display: block; }
  .auth-card h1 { font-size: clamp(34px, 5vw, 46px); }
  .auth-card > p { color: var(--slate); margin: 10px auto 24px; max-width: 35ch; }
  .auth-form { display: grid; gap: 14px; text-align: left; }
  .auth-form label { display: grid; gap: 7px; color: var(--ink); font-weight: 900; font-size: 14px; }
  .auth-form input { width: 100%; border: 2px solid var(--border); border-radius: 14px; padding: 12px 14px; font: inherit; font-weight: 700; color: var(--ink); background: var(--cloud); }
  .auth-form input:focus { border-color: var(--leaf); outline: 3px solid var(--sprout); }
  .auth-form .terms { display: flex; gap: 9px; align-items: flex-start; color: var(--slate); font-size: 12.5px; font-weight: 700; }
  .auth-form .terms input { width: 17px; height: 17px; margin-top: 2px; }
  .auth-form .btn { width: 100%; margin-top: 5px; }
  .auth-switch { margin-top: 22px; color: var(--slate); font-weight: 700; font-size: 14px; }
  .auth-switch a { color: var(--forest); font-weight: 900; text-decoration: underline; }
</style>
</head>
<body>
<nav class="nav" aria-label="Main"><div class="wrap"><div class="pill">
  <a class="brand" href="home.html"><img src="../logo/mascot.svg" alt=""><span class="bw">dogear</span></a>
  <ul class="links"><li><a href="home.html">Home</a></li><li><a href="shop.html">Shop</a></li><li><a href="events.html">Events</a></li><li><a href="rewards.html">Rewards</a></li><li><a href="about.html">About</a></li></ul>
  <div class="acts"><button class="icon-btn" id="themeToggle" aria-label="Switch between light and dark theme"><svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg><svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></button><a class="icon-btn" href="cart.html" aria-label="Bag, 2 items"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12l-1.5 13h-9L6 7z"/><path d="M9 7a3 3 0 0 1 6 0"/></svg><i class="badge">2</i></a><div class="auth-actions"><a class="auth-link primary" href="signin.html">Sign in / Sign up</a></div><button class="menu-btn" aria-label="Open menu">☰</button></div>
</div></div></nav>
<main class="auth-page"><section class="auth-card card folded" aria-labelledby="signup-title">
  <img src="../logo/mascot.svg" alt="Folio">
  <span class="kicker">JOIN THE CLUB</span><h1 id="signup-title">Make reading your daily win.</h1>
  <p>Track your streak, save your favorites, and earn more books.</p>
  <form class="auth-form" data-auth-form="signup"><label>Your name<input type="text" name="name" autocomplete="name" required></label><label>Email address<input type="email" name="email" autocomplete="email" required></label><label>Create a password<input type="password" name="password" autocomplete="new-password" minlength="6" required></label><label class="terms"><input type="checkbox" required><span>I agree to get occasional bookish emails and can unsubscribe anytime.</span></label><button class="btn" type="submit">Create free account</button></form>
  <p class="auth-switch">Already a reader? <a href="signin.html">Sign in</a></p>
</section></main>
<script src="theme.js"></script>
</body>
</html>
